name: Reusable Python Release

on:
  workflow_call:
    inputs:
      runs-on:
        description: >-
          JSON-encoded runner label (e.g. '"ubuntu-latest"') or label array
          (e.g. '["self-hosted","linux"]'). Empty = use vars.CI_RUNNER or
          ubuntu-latest.
        required: false
        type: string
        default: ''
      python-version:
        description: 'Python version for release'
        required: false
        default: '3.11'
        type: string
    secrets:
      SEMANTIC_RELEASE_PRIVATE_KEY:
        description: 'GitHub App private key for semantic release'
        required: true
    outputs:
      released:
        description: 'Whether a release was made'
        value: ${{ jobs.semantic-release.outputs.released }}
      version:
        description: 'Version that was released'
        value: ${{ jobs.semantic-release.outputs.version }}
      tag:
        description: 'Git tag that was created'
        value: ${{ jobs.semantic-release.outputs.tag }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  semantic-release:
    runs-on: ${{ fromJSON(inputs.runs-on != '' && inputs.runs-on || vars.CI_RUNNER != '' && vars.CI_RUNNER || '"ubuntu-latest"') }}
    # Skip if triggered by tag push or by semantic-release's own commits
    if: github.ref_type != 'tag' && github.event.head_commit.author.email != 'semantic-release'
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
      tag: ${{ steps.semantic.outputs.tag }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          lfs: true

      - name: Disable LFS lock verification
        run: git config lfs.locksverify false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Python Semantic Release
        run: |
          python -m pip install --upgrade pip
          pip install python-semantic-release poetry

      - name: Configure semantic-release defaults
        id: config
        run: |
          # Add missing semantic-release config (branches and commit parser options)
          if [ -f pyproject.toml ]; then
            if ! grep -q 'version_toml' pyproject.toml; then
              cat >> pyproject.toml << 'EOF'

          [tool.semantic_release]
          version_toml = ["pyproject.toml:project.version"]
          EOF
              echo "Added version_toml to pyproject.toml"
            fi
            # Append branch config to existing pyproject.toml if not already present
            if ! grep -q 'tool.semantic_release.branches' pyproject.toml; then
              cat >> pyproject.toml << 'EOF'

          [tool.semantic_release.branches.main]
          match = "(main|master)"
          prerelease = false

          [tool.semantic_release.branches.maintenance]
          match = "^\\d+(\\.\\d+)?\\.x$"
          prerelease = false
          EOF
              echo "Added branch configuration to pyproject.toml"
            fi
            # Append commit parser options if not already present
            if ! grep -q 'tool.semantic_release.commit_parser_options' pyproject.toml; then
              cat >> pyproject.toml << 'EOF'

          [tool.semantic_release.commit_parser_options]
          allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
          minor_tags = ["feat"]
          patch_tags = ["fix", "perf", "build"]
          EOF
              echo "Added commit parser options to pyproject.toml"
            fi
            echo "config_flag=" >> "$GITHUB_OUTPUT"
          else
            # Create standalone config file and use -c flag
            cat > .semantic-release.toml << 'EOF'
          [semantic_release.branches.main]
          match = "(main|master)"
          prerelease = false

          [semantic_release.branches.maintenance]
          match = "^\\d+(\\.\\d+)?\\.x$"
          prerelease = false

          [semantic_release.commit_parser_options]
          allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
          minor_tags = ["feat"]
          patch_tags = ["fix", "perf", "build"]
          EOF
            echo "Created .semantic-release.toml"
            echo "config_flag=-c .semantic-release.toml" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Semantic Release
        id: semantic
        run: |
          # Force patch-only releases on maintenance branches (M.x or M.N.x)
          FORCE_LEVEL=""
          if [[ "$GITHUB_REF_NAME" =~ ^[0-9]+(\.[0-9]+)?\.x$ ]]; then
            FORCE_LEVEL="--patch"
            echo "Maintenance branch detected — forcing patch-level releases"
          fi

          echo "Running semantic-release..."

          if semantic-release ${{ steps.config.outputs.config_flag }} version $FORCE_LEVEL 2>&1 | tee /tmp/semantic-release.log; then
            # Check if semantic-release created a tag on HEAD
            LATEST_TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "")

            if [[ -n "$LATEST_TAG" ]] && git ls-remote --tags origin "$LATEST_TAG" | grep -q "$LATEST_TAG"; then
              echo "Release tag on HEAD: ${LATEST_TAG}"
              echo "Publishing release..."
              semantic-release ${{ steps.config.outputs.config_flag }} publish 2>&1 | tee -a /tmp/semantic-release.log

              VERSION=${LATEST_TAG#v}
              {
                echo "released=true"
                echo "version=${VERSION}"
                echo "tag=${LATEST_TAG}"
              } >> "$GITHUB_OUTPUT"
              echo "Released version: ${VERSION}"
            else
              if [[ -n "$LATEST_TAG" ]]; then
                echo "Tag ${LATEST_TAG} exists locally but not on remote — release push failed"
              else
                echo "No release tag on HEAD — no release needed"
              fi
              echo "released=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Semantic-release failed"
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Semantic-release log:"
          cat /tmp/semantic-release.log || echo "No log available"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_LFS_SKIP_PUSH: '1'
