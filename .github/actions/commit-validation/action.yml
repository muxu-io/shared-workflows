name: 'Commit Validation'
description: 'Validates PR commits using commitlint with conventional commit standards'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install commitlint
      run: |
        npm install --global @commitlint/config-conventional @commitlint/cli
      shell: bash

    - name: Find merge base
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      id: merge-base
      run: echo "sha=$(git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})" >> $GITHUB_OUTPUT
      shell: bash

    - name: Validate PR commits with commitlint
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
      run: npx commitlint --config .github/.commitlintrc.json --from ${{ steps.merge-base.outputs.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
      shell: bash
